<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethiopian Literary Archive | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <header>
            <h1>Ethiopian Literary Archive</h1>
            <p class="subtitle">Preserving voices from the Horn of Africa</p>
        </header>

        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Search authors..." class="search-input">

        <div class="authors-grid" id="authorsGrid">
            <div class="loading">Loading authors...</div>
        </div>

        <footer>
            <p>© 2024 Ethiopian Literary Archive — A digital collection of Ethiopian literary heritage</p>
        </footer>
    </div>

    <script src="script.js"></script>

</html>
